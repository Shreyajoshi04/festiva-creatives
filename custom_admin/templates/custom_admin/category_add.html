{% extends 'custom_admin/base_admin.html' %}

{% block content %}
<h2><i class="bi bi-tags"></i> Add Event Category</h2>
<div class="card mt-4 col-md-6">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label for="name" class="form-label fw-bold">Category Name</label>
                <input type="text" class="form-control form-control-lg" id="name" name="name" placeholder="E.g., Birthday, Marriage" required>
            </div>
            <button type="submit" class="btn btn-success"><i class="bi bi-check-circle"></i> Save Category</button>
            <a href="{% url 'custom_admin:category_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}

{% extends 'custom_admin/base_admin.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Event Categories</h2>
    <a href="{% url 'custom_admin:category_add' %}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Add New Category</a>
</div>
<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Category Name</th>
                </tr>
            </thead>
            <tbody>
                {% for cat in categories %}
                <tr>
                    <td>{{ cat.id }}</td>
                    <td class="fw-bold">{{ cat.name }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="2" class="text-center py-4">No categories found. Click 'Add New Category' to start.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

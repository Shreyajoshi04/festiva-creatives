{% extends 'custom_admin/base_admin.html' %}
{% block content %}
<h2><i class="bi bi-images"></i> Add Event Theme</h2>
<div class="card mt-4 col-md-8">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="name" class="form-label fw-bold">Theme Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="category_id" class="form-label fw-bold">Category</label>
                    <select class="form-select" id="category_id" name="category_id" required>
                        <option value="">Select Category...</option>
                        {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label fw-bold">Description</label>
                <textarea class="form-control" id="description" name="description" rows="3"></textarea>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="price" class="form-label fw-bold">Price (₹)</label>
                    <input type="number" step="0.01" class="form-control" id="price" name="price" value="0.0">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="caste_preference" class="form-label fw-bold">Caste / Tradition</label>
                    <input type="text" class="form-control" id="caste_preference" name="caste_preference" placeholder="e.g. Maharashtrian">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="image" class="form-label fw-bold">Theme Image</label>
                    <input type="file" class="form-control" id="image" name="image" required accept="image/*">
                </div>
            </div>
            <hr>
            <button type="submit" class="btn btn-success"><i class="bi bi-check-circle"></i> Save Theme</button>
            <a href="{% url 'custom_admin:theme_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}

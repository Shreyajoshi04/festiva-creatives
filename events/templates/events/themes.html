{% extends 'events/base.html' %}
{% block content %}
<h2 class="text-center mb-4">{{ category.name }} Themes</h2>
<div class="row">
    {% for theme in themes %}
    <div class="col-md-4 mb-4">
        <div class="card shadow-sm">
            {% if theme.image %}
            <img src="{{ theme.image.url }}" alt="{{ theme.name }}" class="card-img-top img-fluid" style="height:250px; object-fit:cover;">
            {% endif %}
            <div class="card-body text-center">
                <h5 class="card-title">{{ theme.name }}</h5>
                <p class="card-text">{{ theme.description|truncatewords:20 }}</p>
                <p class="fw-bold">₹{{ theme.price }}</p>
                <a href="{% url 'add_to_cart' theme.id %}" class="btn btn-success">Add to Cart</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}

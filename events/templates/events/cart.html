{% if cart_items %}
    {% for item in cart_items %}
        <div class="cart-item card mb-3 p-3">
            <h5>{{ item.theme.name }}</h5>
            <p>{{ item.theme.description }}</p>
            <p>Quantity: {{ item.quantity }}</p>
            <p>Price: ₹{{ item.theme.price }}</p>
            <a href="{% url 'remove_from_cart' item.id %}" class="btn btn-danger">Remove</a>
            <a href="{% url 'clear_cart' %}" class="btn btn-warning">Clear Cart</a>
        </div>
    {% endfor %}

    <hr>
    <h4 class="text-end">Total: ₹{{ total }}</h4>
{% else %}
    <p>Your cart is empty.</p>
{% endif %}
